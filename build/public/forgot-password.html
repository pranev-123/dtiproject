<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>REC Classroom Attention | Forgot Password</title><meta name="viewport" content="width=device-width,initial-scale=1"/><link rel="stylesheet" href="/styles.css"/><style>.login-shell{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background-color:#000;background-image:url("background%20image.jpg");background-size:cover;background-position:center}.login-card{width:100%;max-width:420px;background:#fff;border-radius:22px;box-shadow:0 20px 50px rgba(15,9,59,.25);padding:26px 26px 22px}.login-header{display:flex;align-items:center;gap:14px;margin-bottom:18px}.header-logo{height:70px;width:auto;object-fit:contain}.login-title-main{font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#24135f}.login-title-sub{font-size:12px;color:#756f94}.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}.field label{font-size:13px;font-weight:600;color:#413563}.field input{border-radius:999px;border:1px solid rgba(36,19,95,.18);padding:9px 14px;font-size:14px;outline:0}.field input:focus{border-color:#5c2eb8;box-shadow:0 0 0 2px rgba(92,46,184,.18)}.primary{display:inline-flex;align-items:center;justify-content:center;padding:10px 28px;border-radius:999px;border:none;cursor:pointer;font-size:14px;font-weight:800;text-transform:uppercase;color:#fff!important;background:linear-gradient(120deg,#5c2eb8,#24135f)!important;box-shadow:0 0 12px rgba(255,0,255,.5),0 0 24px rgba(0,229,255,.4),0 0 36px rgba(255,255,0,.3);transition:box-shadow .2s ease}.primary:hover{opacity:.95;box-shadow:0 0 16px rgba(255,0,255,.65),0 0 30px rgba(0,229,255,.55),0 0 44px rgba(255,255,0,.45)}.login-footer{font-size:11px;color:#8c86a7;text-align:center;margin-top:12px}.error-text{font-size:12px;color:#c0392b;min-height:16px}.success-text{font-size:12px;color:#1b5e20;min-height:16px}.back-link{display:inline-block;margin-top:10px;color:#5c2eb8;text-decoration:none;font-size:13px;font-weight:600}.back-link:hover{text-decoration:underline}</style></head><body><div class="login-shell"><div class="login-card"><div class="login-header"><img src="/rec-logo.jpg" alt="REC Logo" class="header-logo"/><div class="header-text"><div class="login-title-main">Forgot password</div><div class="login-title-sub">Faculty — Reset &amp; email password</div></div></div><p class="hint-small" style="margin-bottom:14px">Enter your official email. Your default password (your <strong>Staff ID</strong>, or Rec@2026 for older accounts) will be reset and <strong>emailed to you</strong>. Please log in using the password sent to your email.</p><form id="forgotForm"><div class="field"><label for="email">Official email ID</label> <input type="email" id="email" name="email" placeholder="name@rajalakshmi.edu.in" required/></div><div class="error-text" id="errorText"></div><div class="success-text" id="successText"></div><div style="margin-top:12px"><button class="primary" type="submit" id="btnSubmit">Reset password</button></div><a href="/login" class="back-link">← Back to sign in</a></form><div class="login-footer">© <span id="year"></span> Rajalakshmi Engineering College</div></div></div><script>document.getElementById("year").textContent=(new Date).getFullYear();const form=document.getElementById("forgotForm"),errorText=document.getElementById("errorText"),successText=document.getElementById("successText"),btnSubmit=document.getElementById("btnSubmit");form.addEventListener("submit",async e=>{e.preventDefault(),errorText.textContent="",successText.textContent="",btnSubmit.disabled=!0;const t=(form.email.value||"").trim().toLowerCase();if(!t.endsWith("@rajalakshmi.edu.in"))return errorText.textContent="Use your official @rajalakshmi.edu.in email.",void(btnSubmit.disabled=!1);try{const e=await fetch("/api/forgot-password",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:t})}),n=await e.json();n.ok?(successText.textContent=n.message||"Check your email and log in with the mailed password.",setTimeout(()=>{window.location.href="/login"},3e3)):errorText.textContent=n.message||"Request failed."}catch(e){errorText.textContent="Unable to reach server. Try again."}finally{btnSubmit.disabled=!1}})</script></body></html>
