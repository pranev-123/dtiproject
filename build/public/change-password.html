<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Change Password | REC Faculty</title><meta name="viewport" content="width=device-width,initial-scale=1"/><link rel="stylesheet" href="/styles.css"/><style>.change-password-shell{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f4f2fb 0,#e8e7f0 100%);padding:24px}.change-password-card{width:100%;max-width:400px;background:#fff;border-radius:16px;box-shadow:0 12px 40px rgba(36,19,95,.15);padding:28px;border:1px solid rgba(36,19,95,.08)}.change-password-card h1{margin:0 0 8px;font-size:18px;color:#24135f}.change-password-card p{margin:0 0 20px;font-size:13px;color:#6b6586}.field{margin-bottom:14px}.field label{display:block;font-size:13px;font-weight:600;color:#413563;margin-bottom:4px}.field input{width:100%;padding:10px 14px;border-radius:999px;border:1px solid rgba(36,19,95,.18);font-size:14px;outline:0;box-sizing:border-box}.field input:focus{border-color:#5c2eb8;box-shadow:0 0 0 2px rgba(92,46,184,.18)}.message{font-size:13px;margin-top:10px;min-height:18px}.message.error{color:#c62828}.message.success{color:#1b5e20}.btn-submit{width:100%;padding:12px;border-radius:999px;border:none;background:linear-gradient(135deg,#5c2eb8,#6b3dbf);color:#fff;font-weight:600;font-size:14px;cursor:pointer;margin-top:8px}.btn-submit:hover{opacity:.95}.btn-submit:disabled{opacity:.6;cursor:not-allowed}</style></head><body><div class="change-password-shell"><div class="change-password-card"><h1>Change password</h1><p>You must set a new password before using the dashboard.</p><form id="changePasswordForm"><div class="field"><label for="oldPassword">Current / temporary password</label> <input type="password" id="oldPassword" name="oldPassword" autocomplete="current-password" required/></div><div class="field"><label for="newPassword">New password (6–32 characters)</label> <input type="password" id="newPassword" name="newPassword" minlength="6" maxlength="32" autocomplete="new-password" required/></div><div class="message" id="message"></div><button type="submit" class="btn-submit" id="btnSubmit">Update password</button></form></div></div><script>const form=document.getElementById("changePasswordForm"),message=document.getElementById("message"),btnSubmit=document.getElementById("btnSubmit");form.addEventListener("submit",async e=>{e.preventDefault(),message.textContent="",message.className="message",btnSubmit.disabled=!0;const s=document.getElementById("oldPassword").value,t=document.getElementById("newPassword").value;try{const e=await fetch("/api/change-password",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({oldPassword:s,newPassword:t})}),a=await e.json();a.ok?(message.textContent=a.message||"Password updated. Redirecting…",message.className="message success",setTimeout(()=>{window.location.href="/"},1500)):(message.textContent=a.message||"Could not update password.",message.className="message error",btnSubmit.disabled=!1)}catch(e){message.textContent="Server error. Please try again.",message.className="message error",btnSubmit.disabled=!1}})</script></body></html>
