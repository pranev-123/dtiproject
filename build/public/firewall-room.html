<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Firewall Room</title><style>body{margin:0;font-family:Arial,sans-serif;background:#f5f7ff;color:#1f2937}.wrap{max-width:1040px;margin:26px auto;padding:0 14px}.card{background:#fff;border:1px solid #dbe2ff;border-radius:14px;padding:14px;box-shadow:0 12px 30px rgba(0,0,0,.08);margin-bottom:12px}h1{margin:0 0 8px;color:#24135f;font-size:24px}.brand{display:flex;align-items:center;gap:10px;margin-bottom:10px}.brand-logo{width:56px;height:56px;object-fit:contain;border-radius:10px;background:#fff;border:1px solid #e5e7eb}.brand-title{font-size:14px;font-weight:800;line-height:1.25;background:linear-gradient(90deg,#7c3aed,#06b6d4,#a855f7,#7c3aed);background-size:240% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:neonFlow 2.8s linear infinite;text-shadow:0 0 8px rgba(124,58,237,.35),0 0 14px rgba(6,182,212,.25)}@keyframes neonFlow{0%{background-position:0 50%}100%{background-position:240% 50%}}.muted{color:#6b7280;font-size:13px}.row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}button{border:none;border-radius:999px;padding:9px 14px;background:#5c2eb8;color:#fff;font-weight:700;cursor:pointer}.btn-lite{background:#fff;color:#374151;border:1px solid #d1d5db}table{width:100%;border-collapse:collapse;font-size:12px}td,th{border-bottom:1px solid #e5e7eb;text-align:left;padding:8px 6px;vertical-align:top}th{color:#374151;background:#fafafa}.small{font-size:11px;color:#6b7280}#status{min-height:18px;font-size:13px;margin-top:8px}</style></head><body><div class="wrap"><div class="card"><div class="brand"><img class="brand-logo" src="/rec-logo.jpg" alt="Rajalakshmi Engineering College logo"/><div class="brand-title">Rajalakshmi Engineering College<br/>(An Autonomous Institution)</div></div><h1>Firewall Room</h1><div class="muted">Live room for connected devices in the detected network.</div><div class="row"><button id="btnRefresh" type="button">Refresh</button> <button id="btnScope" type="button" class="btn-lite">Scope: current network</button> <button id="btnFirewallLogin" type="button" class="btn-lite">Firewall login page</button> <button id="btnBack" type="button" class="btn-lite">Back dashboard</button></div><div id="status"></div></div><div class="card"><h3 style="margin:0 0 8px;color:#24135f">Connected devices</h3><div id="connectedDevices"></div></div><div class="card"><h3 style="margin:0 0 8px;color:#24135f">Firewall logs</h3><div id="firewallLogs"></div></div></div><script>const statusEl=document.getElementById("status"),connectedEl=document.getElementById("connectedDevices"),logsEl=document.getElementById("firewallLogs"),btnRefresh=document.getElementById("btnRefresh"),btnScope=document.getElementById("btnScope"),btnFirewallLogin=document.getElementById("btnFirewallLogin"),btnBack=document.getElementById("btnBack");let scope="current";function renderDevices(t){const e=Array.isArray(t)?t:[];e.length?connectedEl.innerHTML="<table><thead><tr><th>Time</th><th>User</th><th>Role</th><th>IP</th><th>Network</th><th>Device</th></tr></thead><tbody>"+e.map(t=>"<tr><td>"+(t.at?new Date(t.at).toLocaleString():"-")+"</td><td>"+(t.actorName||t.email||"-")+'<div class="small">'+(t.email||"-")+"</div></td><td>"+(t.role||"-")+"</td><td>"+(t.ipAddress||"-")+"</td><td>"+(t.networkLabel||"-")+"</td><td>"+(t.userAgent||"-")+"</td></tr>").join("")+"</tbody></table>":connectedEl.innerHTML='<div class="small">No connected devices found for this scope.</div>'}function renderLogs(t){const e=Array.isArray(t)?t:[];e.length?logsEl.innerHTML="<table><thead><tr><th>Time</th><th>Event</th><th>User</th><th>Details</th><th>IP</th><th>Network</th></tr></thead><tbody>"+e.slice(0,160).map(t=>"<tr><td>"+(t.at?new Date(t.at).toLocaleString():"-")+"</td><td>"+(t.event||"-")+"</td><td>"+(t.email||"-")+"</td><td>"+(t.details||"-")+"</td><td>"+(t.ipAddress||"-")+"</td><td>"+(t.networkLabel||"-")+"</td></tr>").join("")+"</tbody></table>":logsEl.innerHTML='<div class="small">No firewall logs available.</div>'}async function loadRoom(){try{statusEl.textContent="Loading...";const t=await fetch("/api/firewall/network-logs?scope="+encodeURIComponent(scope),{credentials:"include"}),e=await t.json().catch(()=>({}));if(!t.ok||!e||!0!==e.ok)throw new Error(e&&e.message||"Unable to load firewall logs.");renderDevices(e.connectedDevices),renderLogs(e.logs),statusEl.textContent=e.unlocked?"Firewall unlocked for this session.":"Firewall not unlocked yet. Use firewall login first."}catch(t){statusEl.textContent=t&&t.message?t.message:"Unable to load firewall room."}}btnRefresh.addEventListener("click",loadRoom),btnScope.addEventListener("click",()=>{scope="current"===scope?"all":"current",btnScope.textContent="current"===scope?"Scope: current network":"Scope: all networks",loadRoom()}),btnFirewallLogin.addEventListener("click",()=>{window.location.href="/firewall-login"}),btnBack.addEventListener("click",()=>{history.back()}),loadRoom()</script></body></html>
