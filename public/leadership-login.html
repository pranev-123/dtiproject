<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>REC Leadership Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/styles.css" />
    <style>
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        position: relative;
        padding: 24px;
      }
      .leadership-login-background {
        position: fixed;
        inset: 0;
        background-image: url("https://dli6r6oycdqaz.cloudfront.net/college-510/user-1343861/d9d7ec54446f49b68b99409f86efeb9f_20250714_121042_510_1343861_Banner1.jpeg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-color: rgb(44, 62, 80);
        z-index: 0;
      }
      .leadership-login-overlay {
        position: fixed;
        inset: 0;
        background: rgba(36, 19, 95, 0.5);
        z-index: 1;
      }
      .leadership-login-card {
        width: 100%;
        max-width: 420px;
        background: #ffffff;
        border-radius: 20px;
        padding: 24px 26px 20px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        position: relative;
        z-index: 2;
      }
      .leadership-login-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }
      .leadership-login-header img {
        height: 54px;
        width: auto;
        object-fit: contain;
      }
      .leadership-login-title {
        font-size: 16px;
        font-weight: 700;
        color: #24135f;
      }
      .leadership-login-subtitle {
        font-size: 12px;
        color: #6b6586;
      }
      .leadership-login-field {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 12px;
      }
      .leadership-login-field label {
        font-size: 13px;
        font-weight: 600;
        color: #413563;
      }
      .leadership-login-field input {
        padding: 9px 14px;
        border-radius: 999px;
        border: 1px solid rgba(36, 19, 95, 0.18);
        font-size: 13px;
        outline: none;
      }
      .leadership-login-field input:focus {
        border-color: #5c2eb8;
        box-shadow: 0 0 0 2px rgba(92, 46, 184, 0.18);
      }
      .leadership-login-primary {
        width: 100%;
        margin-top: 4px;
        padding: 10px 28px;
        border-radius: 999px;
        border: none;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #ffffff !important;
        background: linear-gradient(120deg, #ff00ff, #00e5ff, #ffff00) !important;
        background-size: 220% 220% !important;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        box-shadow:
          0 0 10px rgba(255, 0, 255, 0.7),
          0 0 20px rgba(0, 229, 255, 0.7),
          0 0 35px rgba(255, 255, 0, 0.6) !important;
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease,
          background-position 0.35s ease;
        animation: neonPulse 1.5s ease-in-out infinite alternate;
      }
      .leadership-login-primary:hover {
        transform: translateY(-1px) scale(1.03);
        background-position: 100% 0;
        box-shadow:
          0 0 16px rgba(255, 0, 255, 0.9),
          0 0 30px rgba(0, 229, 255, 0.9),
          0 0 45px rgba(255, 255, 0, 0.9);
      }
      .leadership-login-primary:active {
        transform: translateY(0) scale(0.97);
        box-shadow:
          0 0 8px rgba(255, 0, 255, 0.7),
          0 0 16px rgba(0, 229, 255, 0.7);
      }
      @keyframes neonPulse {
        0% {
          box-shadow:
            0 0 8px rgba(255, 0, 255, 0.6),
            0 0 16px rgba(0, 229, 255, 0.6),
            0 0 24px rgba(255, 255, 0, 0.5);
        }
        100% {
          box-shadow:
            0 0 16px rgba(255, 0, 255, 1),
            0 0 30px rgba(0, 229, 255, 1),
            0 0 40px rgba(255, 255, 0, 1);
        }
      }
      .neon-text {
        background: linear-gradient(90deg, #ff00ff, #00e5ff, #ffff00, #ff00ff);
        background-size: 300% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: neonRgbShift 2s linear infinite;
      }
      @keyframes neonRgbShift {
        0% { background-position: 0% 50%; }
        100% { background-position: 300% 50%; }
      }
      .leadership-register-btn {
        width: 100%;
        margin-top: 10px;
        padding: 9px 18px;
        border-radius: 999px;
        border: 2px solid #5c2eb8;
        background: transparent;
        color: #5c2eb8;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        box-shadow:
          0 0 10px rgba(255, 0, 255, 0.35),
          0 0 20px rgba(0, 229, 255, 0.3),
          0 0 28px rgba(255, 255, 0, 0.25);
        transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
      }
      .leadership-register-btn:hover {
        background: #5c2eb8;
        color: #ffffff;
        box-shadow:
          0 0 14px rgba(255, 0, 255, 0.5),
          0 0 26px rgba(0, 229, 255, 0.45),
          0 0 36px rgba(255, 255, 0, 0.35);
      }
      .leadership-register-cta {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        box-sizing: border-box;
        margin-top: 14px;
        padding: 11px 16px;
        border-radius: 999px;
        border: 2px solid #5c2eb8;
        background: linear-gradient(180deg, #faf8ff 0%, #f0ecff 100%);
        color: #24135f;
        font-size: 13px;
        font-weight: 800;
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        box-shadow:
          0 0 10px rgba(255, 0, 255, 0.25),
          0 0 20px rgba(0, 229, 255, 0.2);
        transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      }
      .leadership-register-cta:hover {
        transform: translateY(-1px);
        background: linear-gradient(180deg, #fff 0%, #f6f3ff 100%);
        box-shadow:
          0 0 14px rgba(255, 0, 255, 0.4),
          0 0 26px rgba(0, 229, 255, 0.35);
      }
      .leadership-register-cta .neon-text {
        background: none;
        -webkit-background-clip: initial;
        background-clip: initial;
        -webkit-text-fill-color: currentColor;
        animation: none;
        color: #5c2eb8;
      }
      .verify-notice {
        display: none;
        margin-bottom: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        background: #e8f4fd;
        border: 1px solid #64b5f6;
        color: #0d47a1;
        font-size: 12px;
        font-weight: 600;
        line-height: 1.4;
      }
      .leadership-login-error {
        min-height: 18px;
        font-size: 12px;
        color: #c62828;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <div class="leadership-login-background"></div>
    <div class="leadership-login-overlay"></div>
    <div class="leadership-login-card">
      <div class="leadership-login-header">
        <img src="/rec-logo.jpg" alt="Rajalakshmi Engineering College" />
        <div>
          <div class="leadership-login-title">Leadership Login</div>
          <div class="leadership-login-subtitle">
            Principal / Directors / Deans / HoDs / Vice Principals
          </div>
        </div>
      </div>
      <form id="leadershipLoginForm" novalidate>
        <div id="verifyNotice" class="verify-notice" role="status"></div>
        <div class="leadership-login-field">
          <label for="email">Official Email ID</label>
          <input type="email" id="email" name="email" autocomplete="username" required />
        </div>
        <div class="leadership-login-field">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter password from credentials email"
            autocomplete="current-password"
            required
            minlength="6"
            maxlength="32"
          />
        </div>
        <!-- OTP step removed: login is password-only -->
        <button type="submit" class="leadership-login-primary">
          <span class="neon-text">Sign in</span>
        </button>
        <a href="/leadership-register" class="leadership-register-cta"><span class="neon-text">Register — leadership account</span></a>
        <div id="leadershipLoginError" class="leadership-login-error"></div>
      </form>
    </div>
    <div style="position:fixed;left:0;right:0;bottom:14px;text-align:center;color:#fff;font-size:12px;z-index:3;">
      © 2026 Rajalakshmi Engineering College ( An Autonmous Institution)
    </div>

    <script>
      (function () {
        try {
          const q = new URLSearchParams(window.location.search || '');
          if (q.get('notice') === 'verify-email') {
            const n = document.getElementById('verifyNotice');
            if (n) {
              n.style.display = 'block';
              n.textContent =
                'Sign in with your password.';
            }
          }
        } catch (e) {}
        const form = document.getElementById('leadershipLoginForm');
        const errorEl = document.getElementById('leadershipLoginError');
        const otpStep = document.getElementById('otpStep');
        const otpInput = document.getElementById('otpInput');
        const btnVerifyOtp = document.getElementById('btnVerifyOtp');
        const btnResendOtp = document.getElementById('btnResendOtp');
        const otpHint = document.getElementById('otpHint');
        let activeOtpChallengeId = null;

        function setOtpStepVisible(visible) {
          if (!otpStep) return;
          otpStep.style.display = visible ? 'block' : 'none';
          if (visible) {
            if (otpHint) otpHint.textContent = 'OTP has been sent to your email. Enter the 6-digit OTP.';
            if (otpInput) {
              otpInput.value = '';
              otpInput.focus();
            }
          }
        }

        async function verifyOtpNow() {
          const otp = (otpInput && otpInput.value ? otpInput.value : '').trim();
          if (!otp) {
            errorEl.textContent = 'Enter OTP.';
            return false;
          }
          if (!activeOtpChallengeId) {
            errorEl.textContent = 'OTP challenge is missing. Please sign in again.';
            return false;
          }
          if (btnVerifyOtp) btnVerifyOtp.disabled = true;
          try {
            const otpRes = await fetch('/api/leadership-login/verify-otp', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ challengeId: activeOtpChallengeId, otp: String(otp).trim() }),
            });
            const otpData = await otpRes.json().catch(() => ({}));
            if (!otpRes.ok || !otpData || otpData.ok !== true) {
              errorEl.textContent = otpData.message || 'OTP verification failed.';
              return false;
            }
            window.location.href = '/leadership';
            return true;
          } catch (err) {
            console.error('OTP verify failed', err);
            errorEl.textContent = 'Unable to verify OTP. Please try again.';
            return false;
          } finally {
            if (btnVerifyOtp) btnVerifyOtp.disabled = false;
          }
        }

        if (btnVerifyOtp) btnVerifyOtp.addEventListener('click', verifyOtpNow);
        if (otpInput) {
          otpInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
              e.preventDefault();
              verifyOtpNow();
            }
          });
        }
        if (btnResendOtp) {
          btnResendOtp.addEventListener('click', async () => {
            if (!activeOtpChallengeId) {
              errorEl.textContent = 'OTP challenge is missing. Please sign in again.';
              return;
            }
            btnResendOtp.disabled = true;
            try {
              const res = await fetch('/api/leadership-login/resend-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ challengeId: activeOtpChallengeId }),
              });
              const data = await res.json().catch(() => ({}));
              if (!res.ok || !data || data.ok !== true) throw new Error((data && data.message) || 'Unable to resend OTP.');
              if (otpHint) otpHint.textContent = data.message || 'A new OTP has been sent to your email.';
              errorEl.textContent = '';
            } catch (err) {
              errorEl.textContent = err && err.message ? err.message : 'Unable to resend OTP.';
            } finally {
              btnResendOtp.disabled = false;
            }
          });
        }

        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          errorEl.textContent = '';

          const email = form.email.value.trim().toLowerCase();
          const password = form.password.value;

          if (!email.endsWith('@rajalakshmi.edu.in')) {
            errorEl.textContent = 'Use your official @rajalakshmi.edu.in email.';
            return;
          }
          if (!password) {
            errorEl.textContent = 'Enter your password.';
            return;
          }
          if (String(password).trim().length < 6 || String(password).trim().length > 32) {
            errorEl.textContent = 'Password must be 6-32 characters.';
            return;
          }

          try {
            const res = await fetch('/api/leadership-login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email, password }),
            });
            const data = await res.json();
            if (!data.ok) {
              errorEl.textContent = data.message || 'Login failed.';
              return;
            }
            window.location.href = '/leadership';
          } catch (err) {
            console.error('Leadership login failed', err);
            errorEl.textContent = 'Unable to connect. Please try again.';
          }
        });
      })();
    </script>
  </body>
</html>
